site_name: FastSIMUS
repo_url: https://github.com/charlesbmi/FastSIMUS
site_url: https://charlesbmi.github.io/FastSIMUS/
site_description: Fast simulator for medical ultrasound, based on SIMUS/MUST
site_author: Charles Guan
edit_uri: edit/main/docs/
repo_name: charlesbmi/FastSIMUS

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/fast_simus"]
  - include-markdown
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fpgmaas/example-project
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/example-project

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
