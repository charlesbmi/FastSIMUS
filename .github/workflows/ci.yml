name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    

jobs:
  lint:
    strategy:
      matrix:
        os: ["macos-latest", "ubuntu-latest"]  # common development platforms
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.25"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python (using uv)
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run linting
        run: uv run ruff lint

  test:
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]  # supported platforms
        python-version: ["3.11", "3.14"]  # oldest and newest supported versions

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.25"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python (using uv)
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest
