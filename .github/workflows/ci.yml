name: CI

on:
  push:
    branches:
      - "main"
  pull_request:


jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run pre-commit hooks
        run: uv run prek run --all-files

  lint:
    strategy:
      matrix:
        os: ["macos-latest", "ubuntu-latest"]  # common development platforms
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run linting
        run: uv run poe lint

  test:
    strategy:
      matrix:
        include:
          # Test oldest and newest on Linux (primary platform)
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.14"
          # Test stable Python version on macOS and Windows (cross-platform validation)
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache testmon data
        uses: actions/cache@v4
        with:
          path: .testmondata
          key: testmon-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'src/**/*.py', 'tests/**/*.py') }}
          restore-keys: |
            testmon-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Run tests with testmon
        run: uv run poe test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: ${{ runner.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Check if documentation can be built
        run: uv run poe docs-test
