name: cuda-smoke

# Self-hosted CUDA runner workflow. The runner must be registered with
# labels [self-hosted, cuda] and have a CUDA-capable GPU (4090 dev box).
# See docs/dev/cuda-runner.md for setup notes.
#
# Triggers on PRs that touch the CUDA paths and on manual dispatch.

on:
  pull_request:
    paths:
      - "src/fast_simus/kernels/cuda_simus.py"
      - "src/fast_simus/kernels/simus_fused.cu"
      - "src/fast_simus/simus.py"
      - "tests/backend/test_cupy.py"
      - "tests/conftest.py"
      - "tests/benchmarks/_bench_sync.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/cuda-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, cuda]
    steps:
      - uses: actions/checkout@v7

      - name: Sync bench dependencies (CuPy + pytest-benchmark)
        run: uv sync --group bench --frozen

      - name: Verify CuPy + GPU
        run: |
          uv run python -c "import cupy as cp; \
              p = cp.cuda.runtime.getDeviceProperties(0); \
              print('GPU:', p['name'].decode() if isinstance(p['name'], bytes) else p['name']); \
              print('CC:', cp.cuda.Device(0).compute_capability)"

      - name: Run CuPy backend tests
        run: |
          uv run pytest tests/backend/test_cupy.py tests/test_simus.py \
            -v -k cupy -p no:xdist -p no:testmon

      - name: Smoke scaling bench (1K + 10K only)
        run: |
          uv run pytest tests/benchmarks/bench_simus_scaling.py \
            --benchmark-only -p no:xdist -m scaling \
            -k "cupy and (1000 or 10000)" \
            --benchmark-min-rounds=1 --benchmark-min-time=0
