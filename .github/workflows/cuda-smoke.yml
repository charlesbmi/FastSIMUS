name: cuda-smoke

# CUDA smoke on machine.dev GPU runners (T4G spot). Uses host CUDA from the runner;
# Flox is not used here because its nix CUDA stub libraries shadow the real driver.
#
# PRs: narrow CuPy backend smoke. Push to main: broader CuPy integration tests.
# Scaling benchmarks: manual workflow_dispatch only.
#
# Setup: https://machine.dev/docs/guides/workflow-setup/
# Fallback if T4G ARM64 fails: machine/gpu=t4/tenancy=spot/id=${{ github.run_id }}

on:
  pull_request:
    paths: &cuda_smoke_paths
      - "src/**/*.py"
      - "src/**/*.cu"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".flox/env/manifest.toml"
      - ".flox/env/manifest.lock"
      - ".github/workflows/cuda-smoke.yml"
  push:
    branches:
      - main
    paths: *cuda_smoke_paths
  workflow_dispatch:
    inputs:
      run_scaling_bench:
        description: Run scaling benchmark (1K + 10K CuPy only)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cuda-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: machine/gpu=t4g/tenancy=spot/id=${{ github.run_id }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: GPU diagnostics
        run: nvidia-smi

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.11"

      # machine.dev runners ship CUDA 13.x; use matching CuPy + CTK wheels (not cupy-cuda12x).
      # TODO: migrate whole pyproject.toml to use CUDA 13 so we don't need this workaround
      # TODO: remove --no-sync flag
      - name: Install CuPy for host CUDA 13
        run: |
          uv pip uninstall cupy-cuda12x
          uv pip install 'cupy-cuda13x[ctk]>=13.0'

      - name: Verify CuPy + GPU
        run: |
          uv run --no-sync python -c "import cupy as cp; \
              p = cp.cuda.runtime.getDeviceProperties(0); \
              print('GPU:', p['name'].decode() if isinstance(p['name'], bytes) else p['name']); \
              print('CC:', cp.cuda.Device(0).compute_capability)"

      - name: Run CuPy backend tests
        run: uv run --no-sync pytest tests/backend/test_cupy.py -v -p no:xdist -p no:testmon

      - name: Run CuPy simus integration tests
        if: github.event_name == 'push'
        run: uv run --no-sync pytest tests/test_simus.py -v -k cupy -p no:xdist -p no:testmon

      - name: Smoke scaling bench (1K + 10K only)
        if: github.event_name == 'workflow_dispatch' && inputs.run_scaling_bench
        run: |
          uv run --no-sync pytest tests/benchmarks/bench_simus_scaling.py \
            --benchmark-only -p no:xdist -p no:testmon -m scaling \
            -k "cupy and (1000 or 10000)" \
            --benchmark-min-rounds=1 --benchmark-min-time=0
