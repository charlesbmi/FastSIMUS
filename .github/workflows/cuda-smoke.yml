name: cuda-smoke

# CUDA smoke on machine.dev GPU runners (T4G spot). PRs get a narrow CuPy check;
# pushes to main add broader CuPy integration tests. Scaling benchmarks are manual only.
#
# Setup: https://machine.dev/docs/guides/workflow-setup/
# Fallback if T4G ARM64 fails: machine/gpu=t4/tenancy=spot/id=${{ github.run_id }}

on:
  pull_request:
    paths: &cuda_smoke_paths
      - "src/**/*.py"
      - "src/**/*.cu"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".flox/env/manifest.toml"
      - ".flox/env/manifest.lock"
      - ".github/workflows/cuda-smoke.yml"
  push:
    branches:
      - main
    paths: *cuda_smoke_paths
  workflow_dispatch:
    inputs:
      run_scaling_bench:
        description: Run scaling benchmark (1K + 10K CuPy only)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cuda-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: machine/gpu=t4g/tenancy=spot/id=${{ github.run_id }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: GPU diagnostics
        run: nvidia-smi

      # uv/pip wheels (NumPy/CuPy) link against host zlib; Flox's nix LD_LIBRARY_PATH
      # does not include /usr/lib by default on ephemeral machine.dev images.
      - name: Install system libraries
        run: |
          sudo apt-get update && sudo apt-get install -y zlib1g
          echo "FLOX_HOST_LIB_DIR=/usr/lib/$(uname -m)-linux-gnu" >> "$GITHUB_ENV"

      - name: Install Flox
        uses: flox/install-flox-action@v2
        with:
          trusted-environments: flox/python-uv

      - name: Install Flox packages
        run: |
          flox activate -c "export LD_LIBRARY_PATH=${FLOX_HOST_LIB_DIR}:\${LD_LIBRARY_PATH:-}; true"

      - name: Verify CuPy + GPU
        run: |
          flox activate -c "export LD_LIBRARY_PATH=${FLOX_HOST_LIB_DIR}:\${LD_LIBRARY_PATH:-}; python -c \"import cupy as cp; \
              p = cp.cuda.runtime.getDeviceProperties(0); \
              print('GPU:', p['name'].decode() if isinstance(p['name'], bytes) else p['name']); \
              print('CC:', cp.cuda.Device(0).compute_capability)\""

      - name: Run CuPy backend tests
        run: |
          flox activate -c "export LD_LIBRARY_PATH=${FLOX_HOST_LIB_DIR}:\${LD_LIBRARY_PATH:-}; \
            pytest tests/backend/test_cupy.py -v -p no:xdist -p no:testmon"

      - name: Run CuPy simus integration tests
        if: github.event_name == 'push'
        run: |
          flox activate -c "export LD_LIBRARY_PATH=${FLOX_HOST_LIB_DIR}:\${LD_LIBRARY_PATH:-}; \
            pytest tests/test_simus.py -v -k cupy -p no:xdist -p no:testmon"

      - name: Smoke scaling bench (1K + 10K only)
        if: github.event_name == 'workflow_dispatch' && inputs.run_scaling_bench
        run: |
          flox activate -c "export LD_LIBRARY_PATH=${FLOX_HOST_LIB_DIR}:\${LD_LIBRARY_PATH:-}; \
            pytest tests/benchmarks/bench_simus_scaling.py \
            --benchmark-only -p no:xdist -p no:testmon -m scaling \
            -k 'cupy and (1000 or 10000)' \
            --benchmark-min-rounds=1 --benchmark-min-time=0"
