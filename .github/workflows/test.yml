name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
    paths:
      - "tests/**"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "codecov.yaml"
      - ".github/workflows/test.yml"
      - ".github/actions/**"


jobs:
  test:
    strategy:
      matrix:
        include:
          # Test oldest and newest on Linux (primary platform)
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.14"
          # Test stable Python version on macOS and Windows (cross-platform validation)
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache testmon data
        uses: actions/cache@v5
        with:
          path: .testmondata
          key: testmon-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'src/**/*.py', 'tests/**/*.py') }}
          restore-keys: |
            testmon-${{ runner.os }}-py${{ matrix.python-version }}-

      # https://github.com/ml-explore/mlx/issues/2281
      - name: Default to g++-12 (Linux only; workaround for MLX issue)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y g++-12
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 120
          sudo update-alternatives --set g++ /usr/bin/g++-12

      - name: Run tests with testmon
        run: uv run poe test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: ${{ runner.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Check if documentation can be built
        run: uv run poe docs-test
