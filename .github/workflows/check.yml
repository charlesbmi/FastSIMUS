name: check

on:
  push:
    branches:
      - "main"
  pull_request:


jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run pre-commit hooks
        run: uv run prek run --all-files

  lint:
    strategy:
      matrix:
        os: ["macos-latest", "ubuntu-latest"]  # common development platforms
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run linting
        run: uv run poe lint
